<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday BB! 💙</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
        --bg:      #b8dff0;
        --bg2:     #d4eef9;
        --bg3:     #8ec8e8;
        --ink:     #0c2a4a;
        --ink2:    #1a4a7a;
        --accent:  #3a8fbf;
        --font-h:  'Cinzel Decorative', serif;
        --font-b:  'Cormorant Garamond', serif;
        --font-m:  'Space Mono', monospace;
    }

    html, body {
        width: 100vw; height: 100vh;
        overflow: hidden;
        font-family: var(--font-b);
        background: var(--bg);
        user-select: none;
    }

    .screen {
        position: fixed; inset: 0;
        display: flex;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.7s ease;
    }
    .screen.active { opacity: 1; pointer-events: all; }


    /* ═══ S1 — WELCOME ═══ */
    #s1 {
        background: linear-gradient(135deg, #b8dff0 0%, #d4eef9 40%, #c5e8f5 65%, #8ec8e8 100%);
        flex-direction: row;
        align-items: center;
    }
    #s1::after {
        content: ''; position: absolute; inset: 0;
        background:
            radial-gradient(ellipse 55% 45% at 15% 20%, rgba(255,255,255,0.45) 0%, transparent 70%),
            radial-gradient(ellipse 40% 50% at 85% 80%, rgba(142,200,232,0.30) 0%, transparent 70%);
        pointer-events: none;
    }
    #s1-left {
        flex: 1; padding: 70px 30px 70px 80px; z-index: 5;
        display: flex; flex-direction: column; justify-content: center; gap: 34px;
    }
    #intro-text {
        font-family: var(--font-h);
        font-size: clamp(1.15rem, 2vw, 2.2rem);
        color: var(--ink);
        line-height: 2.1;
        white-space: pre-line;
        min-height: 13rem;
        letter-spacing: 0.03em;
    }
    #olaf-hint {
        font-family: var(--font-h);
        font-size: clamp(0.78rem, 1.3vw, 1.2rem);
        color: var(--ink2);
        letter-spacing: 0.1em;
        opacity: 0; transition: opacity 0.8s ease;
    }
    #olaf-hint.show { opacity: 1; }
    #s1-right {
        flex: 1; z-index: 5;
        display: flex; align-items: center; justify-content: center;
        padding: 40px;
    }
    #olaf-img {
        max-width: 360px; max-height: 500px; width: 78%;
        object-fit: contain; cursor: pointer;
        filter: drop-shadow(4px 8px 20px rgba(12,42,74,0.22));
    }
    #olaf-img:hover { filter: drop-shadow(4px 8px 32px rgba(12,42,74,0.38)); }


    /* ═══ S2 — PENGUIN ═══ */
    #s2 { background: #000; flex-direction: column; align-items: center; justify-content: center; }
    #penguin-wrap { display: flex; flex-direction: column; align-items: center; gap: 30px; }
    #penguin-canvas, #penguin-gif {
        width: min(340px, 78vw); height: min(340px, 78vw);
        object-fit: contain; cursor: pointer; border-radius: 6px;
    }
    #penguin-gif { display: none; }
    #pindot {
        font-family: var(--font-h);
        font-size: clamp(0.9rem, 2.2vw, 1.5rem);
        color: #fff; letter-spacing: 0.16em; text-align: center; cursor: pointer;
        transition: opacity 0.8s ease;
    }
    #s2-arrow {
        position: fixed; right: 52px; top: 50%;
        transform: translateY(-50%);
        font-family: var(--font-h);
        font-size: 1.15rem; color: #fff; cursor: pointer;
        letter-spacing: 0.15em;
        opacity: 0; pointer-events: none;
        transition: opacity 0.8s ease;
    }
    #s2-arrow.show { opacity: 1; pointer-events: all; }


    /* ═══ S3 — QUESTION ═══ */
    #s3 {
        background: linear-gradient(150deg, #c2e5f5 0%, #daf0fb 45%, #b0d8ee 100%);
        flex-direction: column; align-items: center; justify-content: center;
        gap: 50px; overflow: hidden;
    }
    #s3::after {
        content: ''; position: absolute; inset: 0;
        background: radial-gradient(ellipse 60% 55% at 50% 45%, rgba(255,255,255,0.48) 0%, transparent 70%);
        pointer-events: none;
    }
    #q-text {
        font-family: var(--font-h);
        font-size: clamp(1.05rem, 2vw, 1.85rem);
        color: var(--ink);
        text-align: center; line-height: 2.2;
        padding: 0 60px; z-index: 5;
        min-height: 150px; white-space: pre-line;
        letter-spacing: 0.05em;
    }
    #yn-row { display: flex; gap: 44px; z-index: 5; opacity: 0; transition: opacity 0.7s ease; }
    #yn-row.show { opacity: 1; }
    .yn-btn {
        font-family: var(--font-h);
        font-size: 0.95rem; padding: 13px 52px;
        border: 2px solid var(--ink); border-radius: 50px;
        cursor: pointer; letter-spacing: 0.18em;
        background: transparent; color: var(--ink);
        transition: background 0.22s, color 0.22s;
    }
    .yn-btn:hover { background: var(--ink); color: #fff; }
    #cat-pop {
        position: fixed; top: 50%; left: 50%;
        transform: translate(-50%,-50%) scale(0.5);
        z-index: 200; opacity: 0; pointer-events: none;
        transition: opacity 0.25s ease, transform 0.28s ease;
    }
    #cat-pop.show { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    #cat-pop img {
        width: min(280px, 70vw); height: min(280px, 70vw);
        object-fit: contain;
        filter: drop-shadow(0 8px 22px rgba(0,0,0,0.18));
    }


    /* ═══ S4 — POEM ═══ */
    #s4 {
        background: linear-gradient(145deg, #b4dcee 0%, #ceeaf8 50%, #8ec8e4 100%);
        align-items: stretch; overflow: hidden;
    }
    #s4::after {
        content:''; position:absolute; inset:0;
        background: radial-gradient(ellipse 70% 60% at 28% 38%, rgba(255,255,255,0.36) 0%, transparent 65%);
        pointer-events: none;
    }
    #s4-left {
        width: 46%; min-width: 280px;
        padding: 55px 25px 55px 65px;
        display: flex; flex-direction: column;
        overflow-y: auto; scrollbar-width: none; z-index: 5;
    }
    #s4-left::-webkit-scrollbar { display: none; }
    #poem-header {
        font-family: var(--font-h);
        font-size: clamp(0.65rem, 1vw, 0.88rem);
        color: var(--ink2); letter-spacing: 0.24em;
        text-transform: uppercase; margin-bottom: 28px;
    }
    #poem-text {
        font-family: var(--font-b);
        font-style: italic;
        font-size: clamp(0.95rem, 1.5vw, 1.22rem);
        color: var(--ink);
        line-height: 2.5; white-space: pre-line;
    }
    #s4-right { flex: 1; position: relative; overflow: hidden; z-index: 5; }

    .polaroid {
        position: absolute; opacity: 0;
        transform: scale(0.6) rotate(var(--r));
    }
    .polaroid.pop {
        opacity: 1;
        transform: scale(1) rotate(var(--r));
        transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .polaroid:hover {
        z-index: 50 !important;
        transform: scale(1.12) rotate(0deg) !important;
        transition: transform 0.2s ease;
    }
    .p-frame {
        background: #fff; padding: 6px 6px 26px 6px;
        box-shadow: 3px 5px 16px rgba(12,42,74,0.18), 0 2px 5px rgba(0,0,0,0.07);
    }
    .p-frame img { display: block; object-fit: cover; }

    /* ═══════════════════════════════════════
       S5 — AESTHETIC PLAYLIST
    ═══════════════════════════════════════ */
    #s5 {
        background: #0a0a12;
        flex-direction: column;
        overflow: hidden;
        position: relative;
    }

    /* Animated starfield bg */
    #s5-bg {
        position: absolute; inset: 0; pointer-events: none; overflow: hidden;
    }
    .star {
        position: absolute; background: #fff; border-radius: 50%;
        animation: twinkle var(--d) ease-in-out infinite alternate;
    }
    @keyframes twinkle {
        0%   { opacity: 0.15; transform: scale(1); }
        100% { opacity: 0.9;  transform: scale(1.4); }
    }

    /* Soft aurora blobs */
    #s5-bg::before {
        content: '';
        position: absolute; inset: 0;
        background:
            radial-gradient(ellipse 60% 40% at 20% 30%, rgba(180,100,220,0.18) 0%, transparent 70%),
            radial-gradient(ellipse 50% 35% at 80% 70%, rgba(60,140,220,0.16) 0%, transparent 70%),
            radial-gradient(ellipse 40% 30% at 55% 15%, rgba(240,80,140,0.12) 0%, transparent 70%);
    }

    /* Header bar */
    #playlist-header {
        position: relative; z-index: 10;
        padding: 28px 40px 14px;
        display: flex; align-items: center; justify-content: space-between;
        border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    #playlist-title {
        font-family: var(--font-h);
        font-size: clamp(0.7rem, 1.4vw, 1rem);
        color: #fff;
        letter-spacing: 0.3em;
        text-transform: uppercase;
    }
    #playlist-subtitle {
        font-family: var(--font-b);
        font-style: italic;
        font-size: clamp(0.75rem, 1.2vw, 0.92rem);
        color: rgba(255,255,255,0.45);
        letter-spacing: 0.1em;
    }

    /* Main layout */
    #playlist-body {
        flex: 1; display: flex; overflow: hidden; position: relative; z-index: 10;
    }

    /* Left: track list */
    #track-list {
        width: 360px; min-width: 240px;
        overflow-y: auto; scrollbar-width: thin;
        scrollbar-color: rgba(255,255,255,0.15) transparent;
        padding: 18px 0;
        border-right: 1px solid rgba(255,255,255,0.06);
    }
    #track-list::-webkit-scrollbar { width: 4px; }
    #track-list::-webkit-scrollbar-track { background: transparent; }
    #track-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    .track-item {
        display: flex; align-items: center;
        gap: 14px; padding: 11px 22px;
        cursor: pointer;
        transition: background 0.18s;
        border-radius: 0;
    }
    .track-item:hover { background: rgba(255,255,255,0.05); }
    .track-item.playing { background: rgba(255,255,255,0.09); }

    .track-num {
        font-family: var(--font-m);
        font-size: 10px; color: rgba(255,255,255,0.3);
        width: 18px; text-align: center; flex-shrink: 0;
    }
    .track-item.playing .track-num { display: none; }
    .track-bars {
        display: none; width: 18px; flex-shrink: 0;
        align-items: flex-end; gap: 2px; height: 14px;
    }
    .track-item.playing .track-bars { display: flex; }
    .bar {
        width: 3px; background: #e879b0;
        border-radius: 1px;
        animation: bar-bounce var(--bh) ease-in-out infinite alternate;
    }
    @keyframes bar-bounce { 0% { height: 3px; } 100% { height: var(--bmax); } }

    .track-thumb {
        width: 40px; height: 40px; flex-shrink: 0;
        border-radius: 4px; object-fit: cover;
        background: rgba(255,255,255,0.08);
    }
    .track-info { flex: 1; min-width: 0; }
    .track-name {
        font-family: var(--font-b);
        font-size: clamp(0.82rem, 1.3vw, 0.97rem);
        color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        letter-spacing: 0.04em;
    }
    .track-item.playing .track-name { color: #e879b0; }
    .track-artist {
        font-family: var(--font-m);
        font-size: 10px; color: rgba(255,255,255,0.42);
        letter-spacing: 0.08em; margin-top: 2px;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .track-heart {
        font-size: 12px; opacity: 0.5;
        flex-shrink: 0;
    }
    .track-item.playing .track-heart { opacity: 1; }

    /* Right: player */
    #player-panel {
        flex: 1; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        padding: 30px 40px; gap: 20px;
        overflow: hidden;
    }

    /* Album art / video */
    #video-wrap {
        width: min(440px, 90%);
        aspect-ratio: 16/9;
        border-radius: 12px;
        overflow: hidden;
        position: relative;
        box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.08);
    }
    #yt-frame {
        width: 100%; height: 100%;
        border: none; display: block;
    }
    #video-overlay {
        position: absolute; inset: 0;
        background: linear-gradient(to bottom, transparent 60%, rgba(10,10,18,0.7) 100%);
        pointer-events: none;
    }

    /* Now playing info */
    #now-info {
        text-align: center; width: 100%;
        max-width: 440px;
    }
    #now-title {
        font-family: var(--font-b);
        font-size: clamp(1.1rem, 2vw, 1.55rem);
        color: #fff; letter-spacing: 0.05em;
        font-style: italic;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #now-artist {
        font-family: var(--font-m);
        font-size: clamp(0.65rem, 1vw, 0.78rem);
        color: rgba(255,255,255,0.45);
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin-top: 5px;
    }

    /* Controls */
    #controls {
        display: flex; align-items: center; gap: 24px;
    }
    .ctrl-btn {
        background: none; border: none; cursor: pointer;
        color: rgba(255,255,255,0.6);
        font-size: 20px; padding: 8px;
        transition: color 0.18s, transform 0.12s;
        line-height: 1;
    }
    .ctrl-btn:hover { color: #fff; transform: scale(1.12); }
    #ctrl-play {
        width: 52px; height: 52px;
        background: linear-gradient(135deg, #e879b0, #a855f7);
        border-radius: 50%; border: none;
        cursor: pointer; font-size: 22px; color: #fff;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 4px 20px rgba(232,121,176,0.4);
        transition: transform 0.12s, box-shadow 0.18s;
    }
    #ctrl-play:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(232,121,176,0.6); }

    /* Progress */
    #progress-wrap { width: 100%; max-width: 440px; }
    #progress-bar-bg {
        width: 100%; height: 3px;
        background: rgba(255,255,255,0.12);
        border-radius: 2px; cursor: pointer; overflow: hidden;
    }
    #progress-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, #e879b0, #a855f7);
        border-radius: 2px;
        width: 0%;
        transition: width 0.5s linear;
    }

    /* Tag pills */
    #tag-row {
        display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
        max-width: 440px;
    }
    .tag-pill {
        font-family: var(--font-m);
        font-size: 9px; letter-spacing: 0.15em;
        color: rgba(255,255,255,0.55);
        border: 1px solid rgba(255,255,255,0.14);
        border-radius: 30px; padding: 4px 12px;
        text-transform: uppercase;
    }

    /* Screen transition btn */
    #s5-back {
        position: fixed; bottom: 28px; right: 36px;
        font-family: var(--font-h);
        font-size: 0.72rem; color: rgba(255,255,255,0.35);
        letter-spacing: 0.16em; cursor: pointer;
        z-index: 30;
        transition: color 0.2s;
    }
    #s5-back:hover { color: rgba(255,255,255,0.8); }

    /* S4 continue btn */
    #s4-playlist-btn {
        position: fixed; bottom: 28px; right: 36px;
        font-family: var(--font-h);
        font-size: 0.72rem; color: var(--ink2);
        letter-spacing: 0.16em; cursor: pointer;
        z-index: 30;
        opacity: 0; pointer-events: none;
        transition: opacity 1.2s ease, color 0.2s;
        background: rgba(255,255,255,0.6);
        padding: 10px 20px; border-radius: 30px;
        border: 1px solid rgba(12,42,74,0.2);
    }
    #s4-playlist-btn.show { opacity: 1; pointer-events: all; }
    #s4-playlist-btn:hover { background: rgba(255,255,255,0.9); }

    /* ── MOBILE ── */
    @media (max-width: 680px) {
        #s1 { flex-direction: column-reverse; }
        #s1-left { padding: 22px 18px; gap: 14px; }
        #intro-text { font-size: 1rem; }
        #s1-right { flex: unset; padding: 14px; }
        #olaf-img { max-height: 170px; }
        #s4 { flex-direction: column; }
        #s4-left { width: 100%; min-width: unset; padding: 26px 18px; order: 2; max-height: 52vh; }
        #s4-right { height: 40vh; flex: unset; order: 1; }
        #q-text { padding: 0 18px; font-size: 1rem; }
        .yn-btn { padding: 10px 28px; font-size: 0.82rem; }
        #playlist-body { flex-direction: column; }
        #track-list { width: 100%; height: 38vh; min-width: unset; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.06); }
        #player-panel { padding: 16px 18px; gap: 12px; }
        #video-wrap { width: 100%; }
        #playlist-header { padding: 18px 18px 10px; }
    }
    </style>
</head>
<body>

<!-- S1 -->
<div id="s1" class="screen">
    <div id="s1-left">
        <div id="intro-text"></div>
        <div id="olaf-hint">✦ CLICK MO SI OLAF →</div>
    </div>
    <div id="s1-right">
        <img id="olaf-img" src="public/assets/olaf.png" alt="Olaf" draggable="false">
    </div>
</div>

<!-- S2 -->
<div id="s2" class="screen">
    <div id="penguin-wrap">
        <canvas id="penguin-canvas"></canvas>

    <div id="q-text"></div>

    <div id="s4-left">

    </div>
    <div id="s4-right"></div>

</div>

<!-- S5 — PLAYLIST -->
<div id="s5" class="screen">
    <div id="s5-bg"></div>

    <div id="playlist-header">
        <div>
            <div id="playlist-title">✦ Para Sa Iyo, Mimi ✦</div>
            <div id="playlist-subtitle">your birthday playlist, with love 💙</div>
        </div>
        <div style="font-family:var(--font-m);font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:0.15em;">
            {{ SONGS FOR YOU }}
        </div>

    <div id="playlist-body">
        <div id="track-list"></div>

        <div id="player-panel">

                <iframe id="yt-frame"
                    src="about:blank"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen>
                </iframe>

            </div>

            <div id="now-info">
                <div id="now-title">Choose a song to play ♡</div>
                <div id="now-artist">— your playlist —</div>
            </div>

                <span class="tag-pill">BLACKPINK</span>
                <span class="tag-pill">JENNIE</span>

                </div>

            </div>
        </div>

    <div id="s5-back">← BACK TO POEM</div>

<script>
'use strict';

const sleep = ms => new Promise(r => setTimeout(r, ms));

function goToScreen(fromId, toId, cb) {
    const from = document.getElementById(fromId);
    const to   = document.getElementById(toId);
    from.style.opacity = '0';
    from.style.pointerEvents = 'none';
    setTimeout(() => {
        from.classList.remove('active');
        to.classList.add('active');
        if (cb) cb();
        requestAnimationFrame(() => requestAnimationFrame(() => {
            to.style.opacity = '1';
            to.style.pointerEvents = 'all';
        }));
    }, 720);
}

async function typeLines(el, lines, cMs, lMs) {
    let built = '';
    for (let li = 0; li < lines.length; li++) {
        for (const ch of lines[li]) {
            built += ch; el.textContent = built; await sleep(cMs);
        }
        built += '\n'; el.textContent = built;
        if (li < lines.length - 1) await sleep(lMs);
    }
}

/* ── S1 ── */
async function initScreen1() {
    const el   = document.getElementById('intro-text');
    const hint = document.getElementById('olaf-hint');
    await sleep(400);
    await typeLines(el, [
        "HELLLO BB!!!",
        "TODAY IS YOUR DAYYY!!!",
        "DAHIL LABLAB KO IKAWWW MIMI!!",
        "ITO NAAA ANG MESSAGE KOOO SAYOOOO!!!"
    ], 60, 370);
    await sleep(280);
    hint.classList.add('show');
}

document.getElementById('olaf-img').addEventListener('click', () => {
    goToScreen('s1', 's2', initScreen2);
});

/* ── S2 ── */
let s2State = 0;
function initScreen2() {
    const canvas = document.getElementById('penguin-canvas');
    const gif    = document.getElementById('penguin-gif');
    const pindot = document.getElementById('pindot');
    s2State = 0;
    canvas.style.display = 'block';
    gif.style.display    = 'none';
    pindot.style.opacity = '1';
    pindot.style.pointerEvents = 'all';
    document.getElementById('s2-arrow').classList.remove('show');

    const loader = new Image();
    loader.onload = () => {
        const w = loader.naturalWidth  || 340;
        const h = loader.naturalHeight || 340;
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(loader, 0, 0, w, h);
    };
    loader.src = 'public/assets/penguin-box.gif?' + Date.now();

    function onTap() {
        if (s2State === 0) {
            pindot.style.opacity = '0';
            pindot.style.pointerEvents = 'none';
            s2State = 1;
        } else if (s2State === 1) {
            canvas.style.display = 'none';
            gif.style.display    = 'block';
            gif.src = 'public/assets/penguin-box.gif?' + Date.now();
            s2State = 2;
            setTimeout(() => document.getElementById('s2-arrow').classList.add('show'), 1800);
        }
    }
    canvas.onclick = pindot.onclick = gif.onclick = onTap;
}

function initScreen4() {
    if (poemDone) return;
    const panel = document.getElementById('s4-right');
    LAYOUTS.forEach((pos, i) => {
        const wrap  = document.createElement('div');
        wrap.className = 'polaroid'; wrap.id = 'pol-' + i;
        wrap.style.setProperty('--r', pos.r + 'deg');
        wrap.style.left = pos.x + '%'; wrap.style.top = pos.y + '%';
        wrap.style.zIndex = String(i + 5);
        const frame = document.createElement('div'); frame.className = 'p-frame';
        const img   = document.createElement('img');
        img.src = 'public/assets/' + (i + 1) + '.png';
        img.style.cssText = `width:${pos.s}px;height:${pos.s}px;`;
        frame.appendChild(img); wrap.appendChild(frame); panel.appendChild(wrap);

async function typePoemWithPhotos() {
    poemDone = true;
    const textEl   = document.getElementById('poem-text');
    const scrollEl = document.getElementById('s4-left');
    const btn      = document.getElementById('s4-playlist-btn');
    let built = '';

    for (let li = 0; li < POEM.length; li++) {
        const pol = document.getElementById('pol-' + li);
        if (pol) setTimeout(() => pol.classList.add('pop'), 80);
        for (const ch of POEM[li]) {
            built += ch; textEl.textContent = built;
            scrollEl.scrollTop = scrollEl.scrollHeight;
            await sleep(50);
        }
        built += '\n'; textEl.textContent = built;
        scrollEl.scrollTop = scrollEl.scrollHeight;
        await sleep(410);
    }

    await sleep(500);
    built += '\n💙  Happy Birthday Mimi!!!  💙';
    textEl.textContent = built;
    scrollEl.scrollTop = scrollEl.scrollHeight;

    await sleep(1200);
    btn.classList.add('show');
}

let currentTrack = -1;
let isPlaying = false;
let progressTimer = null;
let progressPct = 0;

function buildStars() {
    const bg = document.getElementById('s5-bg');
    for (let i = 0; i < 80; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        const size = Math.random() * 2.5 + 0.5;
        s.style.cssText = `
            left:${Math.random()*100}%;
            top:${Math.random()*100}%;
            width:${size}px; height:${size}px;
            --d:${(Math.random()*3+1.5).toFixed(1)}s;
            animation-delay:${(Math.random()*4).toFixed(1)}s;
        `;
        bg.appendChild(s);
    }
}

function buildTrackList() {
    const list = document.getElementById('track-list');
    list.innerHTML = '';
    TRACKS.forEach((t, i) => {
        const item = document.createElement('div');
        item.className = 'track-item';
        item.id = 'track-' + i;
        item.innerHTML = `
            <span class="track-num">${String(i+1).padStart(2,'0')}</span>
            <div class="track-bars">
                <div class="bar" style="--bh:0.4s;--bmax:12px;"></div>
                <div class="bar" style="--bh:0.6s;--bmax:9px;animation-delay:0.1s"></div>
                <div class="bar" style="--bh:0.5s;--bmax:13px;animation-delay:0.05s"></div>
            </div>
            <img class="track-thumb" src="https://img.youtube.com/vi/${t.ytId}/mqdefault.jpg" alt="">
            <div class="track-info">
                <div class="track-name">${t.title}</div>
                <div class="track-artist">${t.artist}</div>
            </div>
            <span class="track-heart">♥</span>
        `;
        item.addEventListener('click', () => playTrack(i));
        list.appendChild(item);
    });
}

function playTrack(idx) {
    if (idx < 0 || idx >= TRACKS.length) return;

    // Remove playing class from old
    if (currentTrack >= 0) {
        const old = document.getElementById('track-' + currentTrack);
        if (old) old.classList.remove('playing');
    }

    currentTrack = idx;
    isPlaying = true;
    const t = TRACKS[idx];

    // Highlight new
    const item = document.getElementById('track-' + idx);
    if (item) {
        item.classList.add('playing');
        item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // Load iframe
    const frame = document.getElementById('yt-frame');
    frame.src = `https://www.youtube.com/embed/${t.ytId}?autoplay=1&rel=0&modestbranding=1&enablejsapi=1`;

    // Now playing text
    document.getElementById('now-title').textContent = t.title;
    document.getElementById('now-artist').textContent = t.artist.toUpperCase();

    // Play button shows pause
    document.getElementById('ctrl-play').textContent = '⏸';

    // Fake progress animation
    clearInterval(progressTimer);
    progressPct = 0;
    document.getElementById('progress-bar-fill').style.width = '0%';
    progressTimer = setInterval(() => {
        progressPct = Math.min(progressPct + 0.07, 100);
        document.getElementById('progress-bar-fill').style.width = progressPct + '%';
        if (progressPct >= 100) {
            clearInterval(progressTimer);
            setTimeout(() => playTrack((currentTrack + 1) % TRACKS.length), 800);
        }
    }, 250);
}

function stopPlayback() {
    clearInterval(progressTimer);
    document.getElementById('yt-frame').src = 'about:blank';
    if (currentTrack >= 0) {
        const old = document.getElementById('track-' + currentTrack);
        if (old) old.classList.remove('playing');
    }
    currentTrack = -1;
    isPlaying = false;
    document.getElementById('progress-bar-fill').style.width = '0%';
    document.getElementById('now-title').textContent = 'Choose a song to play ♡';
    document.getElementById('now-artist').textContent = '— your playlist —';
    document.getElementById('ctrl-play').textContent = '▶';
}

document.getElementById('ctrl-play').addEventListener('click', () => {
    if (currentTrack === -1) { playTrack(0); return; }
    if (isPlaying) {
        // Pause: can't truly pause iframe without YT API — reload with autoplay=0
        const t = TRACKS[currentTrack];
        document.getElementById('yt-frame').src =
            `https://www.youtube.com/embed/${t.ytId}?autoplay=0&rel=0&modestbranding=1`;
        clearInterval(progressTimer);
        isPlaying = false;
        document.getElementById('ctrl-play').textContent = '▶';
    } else {
        playTrack(currentTrack);
    }
});

document.getElementById('ctrl-prev').addEventListener('click', () => {
    const prev = (currentTrack <= 0 ? TRACKS.length : currentTrack) - 1;
    playTrack(prev);
});
document.getElementById('ctrl-next').addEventListener('click', () => {
    playTrack((currentTrack + 1) % TRACKS.length);
});

document.getElementById('progress-bar-bg').addEventListener('click', function(e) {
    const rect = this.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width * 100;
    progressPct = Math.max(0, Math.min(100, pct));
    document.getElementById('progress-bar-fill').style.width = progressPct + '%';
});

let s5Inited = false;
function initScreen5() {
    if (!s5Inited) {
        buildStars();
        buildTrackList();
        s5Inited = true;
    }
}
